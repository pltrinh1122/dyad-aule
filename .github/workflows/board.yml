name: board

# Activity Board sync (plan node N9) — the CI-driven, one-way projection of DERIVED plan-node
# state onto GitHub (one issue per node; columns as board:<slug> labels; a Projects v2 board when
# a project-scoped token is provisioned). CI is the sync engine — it spends CI minutes, NOT Agent
# tokens (the spine: the Operator ingrains by browsing, never by querying the Agent). The plan
# (plan/<id>.md) stays the single writer of record; this is a level-triggered cache that surfaces
# drift, never a second writer (op-SoT; C2/C3). Runs on every merge to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: write issues (the mirror), read PRs (In-Progress derivation). The default
# GITHUB_TOKEN cannot write user/org Projects v2 — the board layer stays dormant until the
# Operator provisions DYAD_PROJECT_TOKEN (a PAT with 'project' scope). See bin/_board.
permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: board-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Project the derived node state onto the board
        env:
          GH_TOKEN: ${{ github.token }}
          # Dormant unless the Operator adds these (a PAT with 'project' scope + the board number):
          DYAD_PROJECT_TOKEN: ${{ secrets.DYAD_PROJECT_TOKEN }}
          DYAD_PROJECT_NUMBER: ${{ vars.DYAD_PROJECT_NUMBER }}
        # The pushed commit IS ground on a merge build, so derive against HEAD (not origin/main,
        # which a fresh checkout may not resolve). --dry-run first would print without mutating;
        # here we apply the issue-mirror and surface any DRIFT/SEAM lines in the log.
        run: ./bin/_board sync --ref HEAD
